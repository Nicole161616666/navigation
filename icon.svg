<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4a6cf7;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#5c7cfa;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#667eea;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="innerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
            <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
        </linearGradient>
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1a36c4" flood-opacity="0.3"/>
        </filter>
    </defs>
    <g filter="url(#dropShadow)">
        <rect width="192" height="192" rx="48" fill="url(#bgGradient)"/>
        <rect width="192" height="192" rx="48" fill="url(#innerGradient)"/>
    </g>
    <g transform="translate(96, 96)">
        <circle cx="-32" cy="0" r="12" fill="white" stroke="#3b5bdb" stroke-width="3"/>
        <circle cx="32" cy="0" r="12" fill="white" stroke="#3b5bdb" stroke-width="3"/>
        <path d="M-20 0 C-20 16 20 16 20 0 C20 -16 -20 -16 -20 0" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
        <circle cx="-32" cy="0" r="5" fill="#4a6cf7"/>
        <circle cx="32" cy="0" r="5" fill="#4a6cf7"/>
    </g>
</svg>