<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4a6cf7">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <title>导航链接管理器</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #4a6cf7 0%, #667eea 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .loading {
            text-align: center;
            color: white;
            animation: fadeIn 0.5s ease;
        }
        .loading .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .loading h2 {
            margin: 0 0 8px 0;
            font-size: 20px;
            font-weight: 600;
        }
        .loading p {
            margin: 0;
            font-size: 14px;
            opacity: 0.8;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="icon">🔗</div>
        <h2>导航链接管理器</h2>
        <p>正在检测设备类型...</p>
    </div>

    <script>
        function isMobileDevice() {
            const ua = navigator.userAgent.toLowerCase();
            
            const mobileKeywords = [
                'android', 'iphone', 'ipad', 'ipod', 'blackberry',
                'windows phone', 'iemobile', 'opera mini'
            ];
            
            for (const keyword of mobileKeywords) {
                if (ua.includes(keyword)) {
                    return true;
                }
            }

            if (ua.includes('mobile') && !ua.includes('ipad')) {
                return true;
            }

            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                return true;
            }

            if (window.innerWidth <= 768) {
                return true;
            }

            return false;
        }

        function redirect() {
            const targetPage = isMobileDevice() ? 'mobile.html' : 'pc.html';
            window.location.href = targetPage;
        }

        redirect();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(r => console.log('Service Worker registered:', r))
                    .catch(e => console.log('Service Worker registration failed:', e));
            });
        }
    </script>
</body>
</html>
