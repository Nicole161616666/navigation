<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扩展设置</title>
    <style>
        body {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f7fa;
        }
        
        .header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e5e6eb;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1f2329;
        }
        
        .header p {
            font-size: 14px;
            color: #646a73;
            margin-top: 4px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1f2329;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e5e6eb;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            background-color: #fff;
            color: #1f2329;
        }
        
        .form-group input:focus {
            border-color: #4a6cf7;
        }
        
        .form-group .hint {
            font-size: 12px;
            color: #8c8c8c;
            margin-top: 6px;
        }
        
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background-color: #4a6cf7;
            color: #fff;
        }
        
        .btn-primary:hover {
            background-color: #3a5af0;
        }
        
        .status {
            margin-top: 12px;
            font-size: 12px;
            color: #52c41a;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .status.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>资源中心导航扩展设置</h1>
        <p>配置扩展的基本选项</p>
    </div>
    
    <div class="form-group">
        <label>导航站地址</label>
        <input type="text" id="nav-url" placeholder="http://localhost:8000/index.html">
        <p class="hint">设置资源中心导航页面的访问地址，扩展将通过此地址添加链接</p>
    </div>
    
    <div class="form-group">
        <label>默认分类</label>
        <input type="text" id="default-category" placeholder="未分类">
        <p class="hint">直接添加链接时使用的默认分类</p>
    </div>
    
    <button class="btn btn-primary" onclick="saveOptions()">保存设置</button>
    <div class="status" id="status">设置已保存</div>
    
    <script src="options.js"></script>
</body>
</html>
